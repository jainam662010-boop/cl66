<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Saved — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:80px 0"><div class="spinner"></div></div>
  </main>
</div>
<div id="bottomNav"></div>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!App.hasProfile()) { location.href = 'dashboard.html'; return; }
  
  App.initPage('bookmarks');
  App.renderBottomNav('bookmarks');
  
  const data = await App.loadData();
  const bm = App.getBookmarks();
  const p = App.getProgress();
  
  // Resolve bookmarks to full chapter objects
  const items = [];
  bm.forEach(key => {
    const [sid, cid] = key.split('::');
    const subj = App.getSubject(sid);
    const ch = App.getChapter(sid, cid);
    if (subj && ch) items.push({ subj, ch, sid, cid });
  });
  
  document.getElementById('mainArea').innerHTML = `
    <div class="page-animate">
      <!-- Header -->
      <div class="page-head" style="padding: 12px 0; margin-bottom: 20px;">
        <h1 style="margin:0; font-size:1.4rem;">🔖 Saved</h1>
        <p style="color:var(--ink-4); margin:4px 0 0 0; font-size:0.9rem;">
          ${items.length} item${items.length !== 1 ? 's' : ''} saved
        </p>
      </div>
      
      <!-- Bookmarks List -->
      <div class="bookmarks-list-mobile">
        ${items.length > 0 ? items.map(({subj, ch, sid, cid}) => {
          const done = (p[sid]?.done || []).includes(cid);
          return `
            <div class="card-mobile" style="margin-bottom: 12px; padding: 16px;">
              <div style="display:flex; align-items:center; gap: 12px; margin-bottom: 12px;">
                <div style="width: 48px; height: 48px; border-radius: 12px; background: ${subj.bg || 'var(--accent-bg)'}; color: ${subj.color || 'var(--accent)'}; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                  ${subj.icon}
                </div>
                <div style="flex: 1;">
                  <div style="font-weight: 600; font-size: 1rem;">${VidyaSec.sanitize(ch.title)}</div>
                  <div style="font-size: 0.85rem; color: var(--ink-4);">${VidyaSec.sanitize(subj.name)}</div>
                </div>
              </div>
              <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <span style="font-size: 0.75rem; padding: 4px 8px; background: var(--bg-2); border-radius: 6px;">▶ ${ch.lessons?.length || 0} Lessons</span>
                ${done ? '<span style="font-size: 0.75rem; padding: 4px 8px; background: var(--sci-bg); color: var(--sci-c); border-radius: 6px;">✅ Done</span>' : ''}
              </div>
              <div style="display: flex; gap: 8px;">
                <a href="chapter.html?subject=${sid}&chapter=${cid}" class="btn btn-primary" style="flex: 1; text-align: center;">
                  ${done ? 'Review' : 'Continue'}
                </a>
                <button onclick="removeBookmark('${sid}', '${cid}', this)" class="btn btn-secondary" style="padding: 12px 16px;">
                  🗑️
                </button>
              </div>
            </div>
          `;
        }).join('') : `
          <div style="text-align: center; padding: 60px 20px; color: var(--ink-4);">
            <div style="font-size: 48px; margin-bottom: 16px;">🔖</div>
            <p style="font-size: 1rem; margin-bottom: 8px;">No saved items yet</p>
            <p style="font-size: 0.9rem; opacity: 0.7;">Bookmark chapters to access them quickly</p>
            <a href="subjects.html" class="btn btn-primary" style="margin-top: 20px;">Browse Subjects</a>
          </div>
        `}
      </div>
    </div>
  `;
});

function removeBookmark(sid, cid, btn) {
  App.toggleBookmark(sid, cid);
  const card = btn.closest('.card-mobile');
  if (card) {
    card.style.transition = 'opacity .3s, transform .3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(() => { card.remove(); App.toast('Removed from saved'); }, 300);
  }
}
</script>
</body>
</html>
