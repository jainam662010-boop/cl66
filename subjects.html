<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Subjects — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:80px 0"><div class="spinner"></div></div>
  </main>
</div>
<div id="bottomNav"></div>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!App.hasProfile()) { location.href = 'dashboard.html'; return; }
  
  App.initPage('subjects');
  App.renderBottomNav('subjects');
  
  const data = await App.loadData();
  const p = App.getProgress();
  const profile = App.getProfile();
  
  // Sort subjects - favourite first
  const sortedSubjs = [...data.subjects];
  if (profile?.favourite) {
    const fi = sortedSubjs.findIndex(s => s.id === profile.favourite);
    if (fi > 0) { const [f] = sortedSubjs.splice(fi, 1); sortedSubjs.unshift(f); }
  }
  
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="page-animate">
      <!-- Header -->
      <div class="page-head" style="padding: 12px 0; margin-bottom: 20px;">
        <h1 style="margin:0; font-size:1.4rem;">📚 All Subjects</h1>
        <p style="color:var(--ink-4); margin:4px 0 0 0; font-size:0.9rem;">Choose a subject to start learning</p>
      </div>
      
      <!-- Subjects Grid -->
      <div class="subjects-grid-mobile">
        ${sortedSubjs.map(s => {
          const pct = App.getSubjPct(s.id, s);
          const sp = p[s.id] || {};
          const done = (sp.done || []).length;
          const total = s.chapters?.length || 0;
          return `
            <a href="subject.html?id=${s.id}" class="subject-tile-mobile touchable">
              <div class="icon" style="background:${s.bg||'var(--accent-bg)'}; color:${s.color||'var(--accent)'};">
                ${s.icon}
              </div>
              <div class="name">${VidyaSec.sanitize(s.name)}</div>
              <div class="progress">${done}/${total} • ${pct}%</div>
            </a>
          `;
        }).join('')}
      </div>
    </div>
  `;
});
</script>
</body>
</html>
